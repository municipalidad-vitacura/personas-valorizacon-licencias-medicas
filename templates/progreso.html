<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procesando…</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --primary: #0f766e;
        --text: #0f172a;
        --muted: #475569;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #e2f4f1 0%, var(--bg) 45%, #eef2ff 100%);
        color: var(--text);
      }

      .card {
        width: min(92vw, 520px);
        background: var(--card);
        border-radius: 16px;
        padding: 36px 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 { margin: 0 0 8px; font-size: 1.4rem; }

      .filename {
        font-size: 0.9rem;
        color: var(--muted);
        margin: 0 0 28px;
        word-break: break-all;
      }

      .spinner {
        width: 52px;
        height: 52px;
        border: 5px solid #e2e8f0;
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 24px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .status-msg {
        font-size: 0.95rem;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .elapsed {
        font-size: 0.82rem;
        color: #94a3b8;
        margin: 0;
      }

      .error-box {
        display: none;
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        background: #fef2f2;
        color: #991b1b;
        font-size: 0.9rem;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: 700;
        color: #fff;
        background: #334155;
        font-size: 0.95rem;
        cursor: pointer;
      }
      .btn:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Procesando archivo…</h1>
      <p class="filename">{{ nombre_archivo }}</p>

      <div class="spinner" id="spinner"></div>
      <p class="status-msg" id="status-msg">Consultando API de licencias médicas…</p>
      <p class="elapsed" id="elapsed">0 s</p>

      <div class="error-box" id="error-box"></div>
      <a class="btn" href="/" style="display:none" id="btn-volver">Volver al inicio</a>
    </main>

    <script>
      (function () {
        var jobId = "{{ job_id }}";
        var start = Date.now();
        var msgs = [
          "Consultando API de licencias médicas…",
          "Calculando remuneraciones mensuales…",
          "Procesando filas del archivo…",
          "Esto puede tardar varios minutos para archivos grandes…",
          "Aún trabajando, por favor espera…",
        ];
        var msgIdx = 0;
        var elapsedEl = document.getElementById("elapsed");
        var statusEl = document.getElementById("status-msg");
        var spinnerEl = document.getElementById("spinner");
        var errorBox = document.getElementById("error-box");
        var btnVolver = document.getElementById("btn-volver");

        function formatSecs(ms) {
          var s = Math.floor(ms / 1000);
          if (s < 60) return s + " s";
          return Math.floor(s / 60) + " min " + (s % 60) + " s";
        }

        // Rotar mensajes cada 8 s
        setInterval(function () {
          msgIdx = (msgIdx + 1) % msgs.length;
          statusEl.textContent = msgs[msgIdx];
        }, 8000);

        // Actualizar contador
        setInterval(function () {
          elapsedEl.textContent = formatSecs(Date.now() - start);
        }, 1000);

        // Polling cada 3 s
        function poll() {
          fetch("/estado/" + jobId)
            .then(function (r) { return r.json(); })
            .then(function (data) {
              if (data.status === "pending") {
                setTimeout(poll, 3000);
              } else if (data.status === "done") {
                window.location.href = "/resultado/" + jobId;
              } else {
                spinnerEl.style.display = "none";
                statusEl.style.display = "none";
                errorBox.style.display = "block";
                errorBox.textContent = "Error: " + (data.error || "desconocido");
                btnVolver.style.display = "inline-block";
              }
            })
            .catch(function () {
              setTimeout(poll, 5000);
            });
        }

        setTimeout(poll, 3000);
      })();
    </script>
  </body>
</html>
